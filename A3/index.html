<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav>
            <div class="logo">
                <img src="./assets/logo.png" alt="">
            </div>

            <div class="nav-center">
                <h4><a href="$">About</a></h4>
                <h4><a href="$">Watch Now</a></h4>
                <h4><a href="$">Actors</a></h4>
                <h4><a href="$">Contact</a></h4>
            </div>

            <div class="nav-menu">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar half"></div>
            </div>
        </nav>

        <section class="home-section">
            <div class="home-left">
                <div class="home-logo">
                    <img src="./assets/logo cut.png" class="squid-logo " alt="">
                    <img src="./assets/icons/blue_star-fr.png" class="logo-star star-blue" alt="">
                    <img src="./assets/icons/yellow_star-fr.png" class="logo-star star-yellow" alt="">
                </div>

                <p>Action / Thriller / Drama Series directed by Dong-hyuk Hwang <br> Season 1: 9 Episodes</p>

                <div class="home-btns">
                    <div class="play-btn">
                        <span>
                            <img src="./assets/icons/play icon.png" alt="">
                            <h3>Play Now</h3>
                        </span>

                    </div>

                    <div class="watch-btn">
                        <!-- <img src="./assets/icons/play-large-line.png" alt=""> -->
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(255,255,255,1)">
                            <path
                                d="M16 18.3915V5.60846L5.77359 12L16 18.3915ZM18 3.80421V20.1957C18 20.9812 17.136 21.46 16.47 21.0437L3.3568 12.848C2.73013 12.4563 2.73013 11.5436 3.3568 11.152L16.47 2.95621C17.1361 2.53993 18 3.01878 18 3.80421Z">
                            </path>
                        </svg>
                        <h3> Watch Trailer</h3>
                    </div>
                </div>
            </div>

            <div class="home-right">
                <div class="scroll-elem">
                    <h2>SCROLL</h2>

                    <div class="scroll-elem-bar"></div>
                </div>

                <div class="squid-man-img">
                    <img src="./assets/squid guy.webp" alt="">
                </div>

                <div class="contacts">
                    <img src="./assets/icons/twitter fr.png" alt="">
                    <img src="./assets/icons/instagram fr.png" alt="">
                    <img src="./assets/icons/facebook fr.png" alt="">
                </div>
            </div>

        </section>

        <div class="image-gallery">
            <div class="image-container">
                <div class="img-card">
                    <img src="./assets/pics/1st.png" alt="">
                    <div class="play-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(255,255,255,1)">
                            <path
                                d="M6 20.1957V3.80421C6 3.01878 6.86395 2.53993 7.53 2.95621L20.6432 11.152C21.2699 11.5436 21.2699 12.4563 20.6432 12.848L7.53 21.0437C6.86395 21.46 6 20.9812 6 20.1957Z">
                            </path>
                        </svg>
                    </div>

                </div>
                <div class="img-card">
                    <img src="./assets/pics/2nd.jpeg" alt="">
                    <div class="play-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(255,255,255,1)">
                            <path
                                d="M6 20.1957V3.80421C6 3.01878 6.86395 2.53993 7.53 2.95621L20.6432 11.152C21.2699 11.5436 21.2699 12.4563 20.6432 12.848L7.53 21.0437C6.86395 21.46 6 20.9812 6 20.1957Z">
                            </path>
                        </svg>
                    </div>
                </div>
                <div class="img-card">
                    <img src="./assets/pics/3rd.jpeg" alt="">
                    <div class="play-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(255,255,255,1)">
                            <path
                                d="M6 20.1957V3.80421C6 3.01878 6.86395 2.53993 7.53 2.95621L20.6432 11.152C21.2699 11.5436 21.2699 12.4563 20.6432 12.848L7.53 21.0437C6.86395 21.46 6 20.9812 6 20.1957Z">
                            </path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

</html>
